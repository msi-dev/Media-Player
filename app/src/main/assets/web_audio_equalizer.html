<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web Audio Equalizer</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 16px;
            background: #111111;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }
        h2 {
            margin: 0 0 4px 0;
            font-size: 1.2rem;
            color: #00E676;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.4);
            font-weight: 900;
        }
        p {
            margin: 0 0 16px 0;
            color: #aaaaaa;
            font-size: 0.8rem;
            text-align: center;
        }
        #visualizer {
            width: 100%;
            height: 110px;
            background: #161616;
            border-radius: 12px;
            border: 1px solid #222222;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        .synth-controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }
        .btn {
            background: #00E676;
            color: #000000;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 3px 10px rgba(0, 230, 118, 0.3);
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 1px 5px rgba(0, 230, 118, 0.5);
        }
        .btn.stop {
            background: #ff1744;
            box-shadow: 0 3px 10px rgba(255, 23, 68, 0.3);
        }
        .synth-label {
            font-size: 0.75rem;
            color: #00E676;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff1744;
            box-shadow: 0 0 6px #ff1744;
            transition: background 0.3s;
        }
        .indicator.active {
            background: #00E676;
            box-shadow: 0 0 8px #00E676;
        }
        .eq-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            background: #161616;
            padding: 24px 12px;
            border-radius: 16px;
            border: 1px solid #222222;
        }
        .eq-band {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 18%;
        }
        .eq-val {
            font-size: 0.7rem;
            font-weight: bold;
            color: #00E676;
            margin-bottom: 12px;
            background: rgba(0,230,118,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            width: 40px;
            text-align: center;
        }
        .slider-wrapper {
            height: 180px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .eq-slider {
            -webkit-appearance: none;
            width: 160px;
            height: 6px;
            border-radius: 3px;
            background: #2a2a2a;
            outline: none;
            transform: rotate(-90deg);
            position: absolute;
            cursor: pointer;
        }
        .eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00E676;
            border: 3px solid #111;
            box-shadow: 0 0 8px #00E676;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .eq-slider::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }
        .eq-title {
            font-size: 0.7rem;
            color: #888888;
            margin-top: 12px;
            font-weight: bold;
        }
        /* Mode switch footer */
        .footer-note {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Digital Web Audio EQ</h2>
    <p>Web Audio API dynamic frequency shaping node</p>

    <!-- Spectrum Visualizer -->
    <canvas id="visualizer"></canvas>

    <!-- Synthetic Tester -->
    <div class="synth-controls">
        <span class="synth-label">
            <span id="synth-indicator" class="indicator"></span>
            Test Engine Synth
        </span>
        <button id="toggle-synth-btn" class="btn">Play Tone</button>
    </div>

    <!-- Sliders Grid -->
    <div class="eq-container">
        <div class="eq-band">
            <span id="val-0" class="eq-val">0dB</span>
            <div class="slider-wrapper">
                <input type="range" id="band-0" class="eq-slider" min="-15" max="15" value="0">
            </div>
            <span class="eq-title">60Hz</span>
        </div>
        <div class="eq-band">
            <span id="val-1" class="eq-val">0dB</span>
            <div class="slider-wrapper">
                <input type="range" id="band-1" class="eq-slider" min="-15" max="15" value="0">
            </div>
            <span class="eq-title">230Hz</span>
        </div>
        <div class="eq-band">
            <span id="val-2" class="eq-val">0dB</span>
            <div class="slider-wrapper">
                <input type="range" id="band-2" class="eq-slider" min="-15" max="15" value="0">
            </div>
            <span class="eq-title">910Hz</span>
        </div>
        <div class="eq-band">
            <span id="val-3" class="eq-val">0dB</span>
            <div class="slider-wrapper">
                <input type="range" id="band-3" class="eq-slider" min="-15" max="15" value="0">
            </div>
            <span class="eq-title">4kHz</span>
        </div>
        <div class="eq-band">
            <span id="val-4" class="eq-val">0dB</span>
            <div class="slider-wrapper">
                <input type="range" id="band-4" class="eq-slider" min="-15" max="15" value="0">
            </div>
            <span class="eq-title">14kHz</span>
        </div>
    </div>

    <div class="footer-note">Full-duplex Web &amp; AOSP Hardware Sync Active</div>

    <script>
        // Web Audio Setup
        let audioCtx;
        let oscillator;
        let filters = [];
        let analyser;
        let isPlayingSynth = false;

        const bandsFreqs = [60, 230, 910, 4000, 14000];
        const bandSliders = [
            document.getElementById('band-0'),
            document.getElementById('band-1'),
            document.getElementById('band-2'),
            document.getElementById('band-3'),
            document.getElementById('band-4')
        ];
        const valLabels = [
            document.getElementById('val-0'),
            document.getElementById('val-1'),
            document.getElementById('val-2'),
            document.getElementById('val-3'),
            document.getElementById('val-4')
        ];

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const synthBtn = document.getElementById('toggle-synth-btn');
        const synthIndicator = document.getElementById('synth-indicator');

        // Resize Canvas
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 110;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Web Audio Initializer
        function initAudio() {
            if (audioCtx) return;

            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContextClass();

            // Create Analyser
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;

            // Create 5 Biquad filters inside the AudioContext graph
            let lastNode = null;
            bandsFreqs.forEach((freq, idx) => {
                const biquad = audioCtx.createBiquadFilter();
                biquad.frequency.value = freq;
                
                // Low shelf for 60Hz, high shelf for 14kHz, peaking for the midrange
                if (idx === 0) {
                    biquad.type = 'lowshelf';
                } else if (idx === baftsLength() - 1) { // bandsFreqs.length length logic
                    biquad.type = 'highshelf';
                } else {
                    biquad.type = 'peaking';
                    biquad.Q.value = 1.0;
                }

                // Initial value from slider state
                const sliderVal = parseFloat(bandSliders[idx].value);
                biquad.gain.value = sliderVal;

                filters.push(biquad);

                if (idx === 0) {
                    // Start of chain goes to synthesizer
                } else {
                    lastNode.connect(biquad);
                }
                lastNode = biquad;
            });

            // Connect last filter to Analyser and Analyser to Output destination
            lastNode.connect(analyser);
            analyser.connect(audioCtx.destination);
        }

        function baftsLength() {
            return bandsFreqs.length;
        }

        // Toggle Local Web Audio API Synthesizer (for demonstration/standalone checking)
        synthBtn.addEventListener('click', () => {
            try {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                if (isPlayingSynth) {
                    // Stop oscillator
                    if (oscillator) {
                        oscillator.stop();
                        oscillator.disconnect();
                        oscillator = null;
                    }
                    isPlayingSynth = false;
                    synthBtn.textContent = "Play Tone";
                    synthBtn.classList.remove('stop');
                    synthIndicator.classList.remove('active');
                } else {
                    // Create an oscillator tone with a cyclic LFO
                    oscillator = audioCtx.createOscillator();
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.value = 80; // Low rich baritone tone to highlight low-end EQ

                    // Connect through the EQ filter chain
                    oscillator.connect(filters[0]);
                    oscillator.start();

                    isPlayingSynth = true;
                    synthBtn.textContent = "Stop Tone";
                    synthBtn.classList.add('stop');
                    synthIndicator.classList.add('active');
                }
            } catch (e) {
                console.error(e);
            }
        });

        // Event hooks for Sliders
        bandSliders.forEach((slider, idx) => {
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                const text = (val >= 0 ? "+" : "") + val + "dB";
                valLabels[idx].textContent = text;

                // 1. Update our Web Audio node gain
                if (filters[idx]) {
                    filters[idx].gain.value = val;
                }

                // 2. Synchronize to native ExoPlayer Equalizer via Javascript Bridge
                if (window.AndroidBridge) {
                    window.AndroidBridge.setNativeEqualizerBand(idx, val);
                }
            });
        });

        // Function called from Android native when user adjusts slider in the native UI
        function setWebEqualizerBand(band, value) {
            const val = parseInt(value);
            if (band >= 0 && band < bandSliders.length) {
                const slider = bandSliders[band];
                slider.value = val;
                valLabels[band].textContent = (val >= 0 ? "+" : "") + val + "dB";
                
                if (filters[band]) {
                    filters[band].gain.value = val;
                }
            }
        }

        // Animated Screen Spectrogram Visualizer loop
        function drawFrame() {
            requestAnimationFrame(drawFrame);

            const width = canvas.width;
            const height = canvas.height;

            // Clear frame
            ctx.fillStyle = '#161616';
            ctx.fillRect(0, 0, width, height);

            if (analyser && isPlayingSynth) {
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                analyser.getByteFrequencyData(dataArray);

                const barWidth = (width / bufferLength) * 1.6;
                let barHeight;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * height * 0.95;

                    // Neon spectral gradient
                    const grad = ctx.createLinearGradient(0, height - barHeight, 0, height);
                    grad.addColorStop(0, '#00E676');
                    grad.addColorStop(0.5, '#00b0ff');
                    grad.addColorStop(1, '#ff3d00');

                    ctx.fillStyle = grad;
                    ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight);

                    x += barWidth;
                }
            } else {
                // Friendly animated lazy soundwaves flatline when synthesizer tests are disabled
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#262626';
                ctx.beginPath();
                ctx.moveTo(0, height / 2);
                
                const waveCount = 4;
                const step = width / 180;
                for (let i = 0; i < width; i++) {
                    const angle = (i * 0.05) + (Date.now() * 0.005);
                    const y = (height / 2) + Math.sin(angle) * 4;
                    ctx.lineTo(i, y);
                }
                ctx.stroke();

                // Draw static node dots
                ctx.fillStyle = '#333333';
                for (let i = 1; i <= 5; i++) {
                    ctx.beginPath();
                    ctx.arc((width / 6) * i, height / 2, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        drawFrame();
    </script>
</body>
</html>
